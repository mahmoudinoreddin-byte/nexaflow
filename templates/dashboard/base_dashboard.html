{% extends "base.html" %}
{% block extra_css %}
<style>
:root{--sidebar-w:250px}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#FFFFFF;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;box-shadow:2px 0 20px rgba(0,0,0,.06)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;background:#F7F8FC}
body{background:#F7F8FC;color:#1A2332}
:root{--text:#1A2332;--muted:#64748B;--border:#E2E8F0;--surface:#FFFFFF;--accent:#4F46E5;--accent2:#7C3AED}
.s-logo{padding:24px 20px 16px;border-bottom:1px solid #E2E8F0}
.s-logo-text{font-family:var(--font-head);font-size:1.2rem;font-weight:800;color:#1A2332}
.s-logo-text span{color:#4F46E5}
.s-nav{padding:16px 12px;flex:1}
.s-nav-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#94A3B8;padding:0 8px;margin-bottom:8px;margin-top:12px}
.s-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.87rem;font-weight:500;color:#64748B;transition:all .15s;margin-bottom:2px}
.s-nav a:hover{background:#F1F5F9;color:#1A2332}
.s-nav a.active{background:#EEF2FF;color:#4F46E5;font-weight:600}
.s-nav a .nav-icon{font-size:1.1rem;width:22px;text-align:center}
.s-user{padding:16px;border-top:1px solid #E2E8F0}
.s-user-inner{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:#F8FAFC}
.s-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.s-user-name{font-size:.82rem;font-weight:600;color:#1A2332}
.s-user-plan{font-size:.72rem;color:#94A3B8}
.topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.topbar-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700;color:#1A2332}
.page-content{padding:28px;flex:1}
.stat-card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-label{font-size:.75rem;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-family:var(--font-head);font-size:2rem;font-weight:800;color:#1A2332;line-height:1}
.stat-sub{font-size:.78rem;color:#94A3B8;margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.section-title{font-family:var(--font-head);font-size:1rem;font-weight:700;color:#1A2332;margin-bottom:4px}
.section-sub{font-size:.82rem;color:#94A3B8;margin-bottom:16px}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.svc-card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:20px;transition:all .2s;cursor:pointer}
.svc-card:hover{border-color:#4F46E5;box-shadow:0 4px 20px rgba(79,70,229,.1);transform:translateY(-2px)}
.svc-icon{font-size:1.8rem;margin-bottom:12px}
.svc-name{font-weight:700;font-size:.9rem;color:#1A2332;margin-bottom:4px}
.svc-desc{font-size:.78rem;color:#94A3B8;line-height:1.5}
.svc-cat{display:inline-block;margin-top:10px;font-size:.68rem;font-weight:700;background:#EEF2FF;color:#4F46E5;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.05em}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #F1F5F9}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:32px;height:32px;border-radius:8px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.activity-text{font-size:.84rem;color:#1A2332;font-weight:500}
.activity-time{font-size:.74rem;color:#94A3B8;margin-top:2px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.stats-row{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.sidebar{transform:translateX(-100%)}.main{margin-left:0}}
</style>
{% endblock %}

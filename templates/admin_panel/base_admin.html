{% extends "base.html" %}
{% block extra_css %}
<style>
:root{--sidebar-w:260px}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#070C14;border-right:1px solid #1C2A3A;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.s-logo{padding:24px 20px;border-bottom:1px solid #1C2A3A}
.s-logo-text{font-family:var(--font-head);font-size:1.2rem;font-weight:800}
.s-logo-text span{color:var(--accent)}
.s-badge{font-size:.65rem;background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.2);color:var(--accent);padding:2px 8px;border-radius:100px;margin-top:4px;display:inline-block;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.s-nav{padding:16px 12px;flex:1}
.s-nav-label{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:6px;margin-top:14px}
.s-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:.87rem;font-weight:500;color:var(--muted);transition:all .15s;margin-bottom:2px}
.s-nav a:hover{background:rgba(255,255,255,.04);color:var(--text)}
.s-nav a.active{background:rgba(0,200,150,.1);color:var(--accent);font-weight:600}
.s-nav a .nav-icon{font-size:1.05rem;width:22px;text-align:center}
.topbar{background:#0A1020;border-bottom:1px solid #1C2A3A;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-family:var(--font-head);font-size:1.05rem;font-weight:700}
.page-content{padding:28px;flex:1}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px}
.stat-label{font-size:.74rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.stat-value{font-family:var(--font-head);font-size:2rem;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:.77rem;color:var(--muted);margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;padding:10px 14px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-head);font-size:1.05rem;font-weight:700}
.input-field{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:8px;font-size:.87rem;font-family:var(--font-body)}
.input-field:focus{outline:none;border-color:var(--accent)}
.filter-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}}
</style>
{% endblock %}

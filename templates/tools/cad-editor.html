<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AetherCAD — Professional 3D Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg: #0F0F0F;
  --bg2: #1A1A1A;
  --bg3: #252525;
  --bg4: #333333;
  --panel: #151515;
  --border: #2C2C2C;
  --border2: #3D3D3D;
  --accent: #0A84FF;
  --accent2: #409CFF;
  --orange: #FF9F0A;
  --green: #32D74B;
  --red: #FF453A;
  --text: #E5E5E5;
  --text2: #98989D;
  --text3: #636366;
  --white: #FFFFFF;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text);
}

html,body{height:100%;overflow:hidden;background:var(--bg);}
button{font-family:inherit;cursor:pointer;background:none;border:none;}
input{font-family:'JetBrains Mono',monospace;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}

/* Menu Bar */
#menubar{
  height:38px;
  background:rgba(26,26,26,0.98);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:2px;
  flex-shrink:0;
}
.app-logo{
  font-size:14px;font-weight:600;
  padding:0 16px 0 4px;
  margin-right:8px;
  border-right:1px solid var(--border);
  background:linear-gradient(135deg,#FFFFFF,#8E8E93);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.app-logo span{background:linear-gradient(135deg,#0A84FF,#5E9CFF);-webkit-background-clip:text;background-clip:text;color:transparent;}
.menu-item{
  padding:5px 12px;border-radius:6px;
  font-size:12px;font-weight:500;color:var(--text2);
  transition:0.1s;
}
.menu-item:hover{background:var(--bg4);color:var(--white);}
#menubar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.mb-badge{
  font-size:10px;color:var(--text2);
  padding:3px 10px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);
}

/* Toolbar */
#main-toolbar{
  height:80px;
  background:rgba(26,26,26,0.96);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:16px;
  flex-shrink:0;
  overflow-x:auto;
}
.tool-group{
  display:flex;
  gap:6px;
  padding:0 12px;
  border-right:1px solid var(--border);
}
.tool-group:last-child{border-right:none;}
.tool-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:5px 14px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:11px;
  font-weight:500;
  min-width:65px;
  height:52px;
  transition:0.1s;
}
.tool-btn:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-1px);}
.tool-btn.active{background:rgba(10,132,255,0.2);border-color:var(--accent);color:var(--accent2);}
.tool-icon{font-size:18px;}
.tool-label{font-size:10px;}

/* Main Area */
#main{display:flex;flex:1;overflow:hidden;}

/* Left Panel */
#left-panel{
  width:260px;
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.panel-header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-weight:600;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
#objects-list{
  flex:1;
  overflow-y:auto;
  padding:8px;
}
.object-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 12px;
  margin:4px 0;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  transition:0.1s;
}
.object-item:hover{background:var(--bg4);border-color:var(--border2);}
.object-item.selected{background:rgba(10,132,255,0.2);border-color:var(--accent);}
.object-icon{font-size:16px;}
.object-info{flex:1;}
.object-name{font-size:11px;font-weight:500;}
.object-type{font-size:9px;color:var(--text3);}
.object-delete{
  opacity:0;
  padding:3px 7px;
  border-radius:5px;
  color:var(--red);
  font-size:12px;
}
.object-item:hover .object-delete{opacity:1;}
.object-delete:hover{background:rgba(255,69,58,0.2);}

/* Canvas */
#canvas-area{
  flex:1;
  position:relative;
  background:#0A0A0A;
  overflow:hidden;
}
#draw-canvas{
  display:block;
  width:100%;
  height:100%;
}
.canvas-corner{
  position:absolute;
  font-size:9px;
  color:rgba(255,255,255,0.3);
  pointer-events:none;
  font-family:'JetBrains Mono',monospace;
}
#corner-tl{top:12px;left:16px;}
#corner-tr{top:12px;right:16px;}
#corner-bl{bottom:38px;left:16px;}

/* View Cube */
#view-cube{
  position:absolute;
  bottom:20px;
  right:20px;
  display:grid;
  grid-template-columns:repeat(3,40px);
  grid-template-rows:repeat(3,40px);
  gap:3px;
  z-index:20;
}
.view-btn{
  background:rgba(30,30,35,0.9);
  backdrop-filter:blur(8px);
  border:1px solid var(--border2);
  border-radius:6px;
  color:var(--text2);
  font-size:10px;
  font-weight:600;
  transition:0.1s;
}
.view-btn:hover{background:var(--accent);border-color:var(--accent);color:white;}
.view-center{background:rgba(10,132,255,0.3);border-color:var(--accent);}

/* Drawing HUD */
#drawing-hud{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(26,26,26,0.95);
  backdrop-filter:blur(12px);
  border:1px solid var(--border2);
  border-radius:12px;
  display:flex;
  padding:8px 16px;
  gap:16px;
  z-index:20;
}
.hud-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
}
.hud-item label{color:var(--text2);}
.hud-item input{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:4px 8px;
  color:var(--text);
  width:70px;
}
.hud-item input:focus{outline:none;border-color:var(--accent);}
.hud-btn{
  background:var(--accent);
  padding:4px 16px;
  border-radius:6px;
  color:white;
  font-weight:500;
  font-size:11px;
}

/* Selection Mode Bar */
#sel-mode-bar{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(26,26,26,0.95);
  backdrop-filter:blur(12px);
  border:1px solid var(--border2);
  border-radius:10px;
  display:flex;
  z-index:20;
}
.sel-btn{
  padding:5px 16px;
  font-size:11px;
  font-weight:500;
  color:var(--text2);
  transition:0.1s;
  border-right:1px solid var(--border);
}
.sel-btn:last-child{border-right:none;}
.sel-btn:hover{background:var(--bg4);color:var(--white);}
.sel-btn.active{background:rgba(10,132,255,0.2);color:var(--accent2);}

/* Right Panel */
#right-panel{
  width:280px;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
.prop-section{
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
.prop-section-title{
  font-size:10px;
  font-weight:600;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:12px;
}
.prop-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.prop-row label{
  width:50px;
  color:var(--text2);
  font-size:11px;
}
.prop-row input{
  flex:1;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:5px 8px;
  color:var(--text);
  font-size:11px;
}
.prop-row input:focus{outline:none;border-color:var(--accent);}
.prop-btn{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:8px;
  color:var(--text);
  font-size:11px;
  font-weight:500;
  margin-top:8px;
  transition:0.1s;
}
.prop-btn:hover{background:var(--bg4);border-color:var(--accent);}
.prop-btn.primary{background:var(--accent);border-color:var(--accent);color:white;}
.prop-btn.danger{background:rgba(255,69,58,0.1);border-color:var(--red);color:var(--red);}
.prop-btn.danger:hover{background:var(--red);color:white;}

/* Status Bar */
#statusbar{
  height:28px;
  background:rgba(26,26,26,0.95);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:20px;
  flex-shrink:0;
  font-size:10px;
}
.status-item{color:var(--text3);display:flex;align-items:center;gap:5px;}
.status-item b{color:var(--text2);}
#status-coords{margin-left:auto;font-family:'JetBrains Mono',monospace;}

#wrapper{display:flex;flex-direction:column;height:100vh;}
</style>
</head>
<body>
<div id="wrapper">
<div id="menubar">
  <div class="app-logo">Aether<span>CAD</span></div>
  <button class="menu-item" id="menu-file">File</button>
  <button class="menu-item" id="menu-edit">Edit</button>
  <button class="menu-item" id="menu-view">View</button>
  <div id="menubar-right">
    <div class="mb-badge">3D DESIGN STUDIO</div>
    <div class="mb-badge" style="color:var(--green);">● READY</div>
  </div>
</div>

<div id="main-toolbar">
  <div class="tool-group">
    <button class="tool-btn" id="tool-rectangle"><span class="tool-icon">⬛</span><span class="tool-label">Rectangle</span></button>
    <button class="tool-btn" id="tool-rounded"><span class="tool-icon">⭔</span><span class="tool-label">Rounded</span></button>
    <button class="tool-btn" id="tool-circle"><span class="tool-icon">●</span><span class="tool-label">Circle</span></button>
  </div>
  <div class="tool-group">
    <button class="tool-btn" id="tool-select"><span class="tool-icon">🖱</span><span class="tool-label">Select</span></button>
    <button class="tool-btn" id="tool-extrude"><span class="tool-icon">📤</span><span class="tool-label">Extrude</span></button>
  </div>
  <div class="tool-group">
    <button class="tool-btn" id="action-delete"><span class="tool-icon">🗑</span><span class="tool-label">Delete</span></button>
    <button class="tool-btn" id="action-clear"><span class="tool-icon">✕</span><span class="tool-label">Clear All</span></button>
  </div>
</div>

<div id="main">
  <div id="left-panel">
    <div class="panel-header"><span>📦</span> Bodies <span style="flex:1"></span><span id="object-count">0</span></div>
    <div id="objects-list"></div>
  </div>

  <div id="canvas-area">
    <canvas id="draw-canvas"></canvas>
    <div class="canvas-corner" id="corner-tl">AetherCAD · 3D Studio</div>
    <div class="canvas-corner" id="corner-tr" id="view-label">Perspective</div>
    <div class="canvas-corner" id="corner-bl">Click drag to draw · Select object · Extrude to 3D</div>
    
    <div id="view-cube">
      <div></div><button class="view-btn" data-view="top">TOP</button><div></div>
      <button class="view-btn" data-view="left">LFT</button><button class="view-btn view-center" data-view="persp">⊙</button><button class="view-btn" data-view="right">RGT</button>
      <div></div><button class="view-btn" data-view="front">FRT</button><button class="view-btn" data-view="bottom">BOT</button>
    </div>
    
    <div id="sel-mode-bar">
      <button class="sel-btn active" id="sel-body">Body</button>
      <button class="sel-btn" id="sel-face">Face</button>
      <button class="sel-btn" id="sel-edge">Edge</button>
    </div>
    
    <div id="drawing-hud">
      <div class="hud-item"><label>W:</label><input type="number" id="hud-w" step="5" value="80"></div>
      <div class="hud-item"><label>H:</label><input type="number" id="hud-h" step="5" value="80"></div>
      <div class="hud-item" id="radius-group"><label>R:</label><input type="number" id="hud-r" step="5" value="20"></div>
      <div class="hud-item"><label>Extrude H:</label><input type="number" id="extrude-height" step="10" value="40"></div>
      <button class="hud-btn" id="apply-extrude-btn">Extrude</button>
    </div>
  </div>

  <div id="right-panel">
    <div class="prop-section"><div class="prop-section-title">📐 Selected</div><div id="selected-info" style="color:var(--text3); font-size:11px;">None</div></div>
    <div class="prop-section"><div class="prop-section-title">📍 Transform</div>
      <div class="prop-row"><label>X:</label><input type="number" id="prop-x" step="1"></div>
      <div class="prop-row"><label>Y:</label><input type="number" id="prop-y" step="1"></div>
      <div class="prop-row"><label>Z:</label><input type="number" id="prop-z" step="1"></div>
      <button class="prop-btn" id="apply-pos">Apply Position</button>
    </div>
    <div class="prop-section"><div class="prop-section-title">📏 Dimensions</div>
      <div class="prop-row"><label>Width:</label><input type="number" id="prop-w" step="5"></div>
      <div class="prop-row"><label>Height:</label><input type="number" id="prop-h" step="5"></div>
      <div class="prop-row" id="prop-radius-row"><label>Radius:</label><input type="number" id="prop-r" step="5"></div>
      <div class="prop-row"><label>Depth:</label><input type="number" id="prop-d" step="5"></div>
      <button class="prop-btn" id="apply-dims">Apply Dimensions</button>
    </div>
    <div class="prop-section"><div class="prop-section-title">🎨 Color</div>
      <div class="prop-row"><label>Fill:</label><input type="color" id="prop-color" value="#4a7ac8"></div>
      <button class="prop-btn" id="apply-color">Apply Color</button>
    </div>
    <div class="prop-section">
      <button class="prop-btn danger" id="delete-selected">Delete Selected</button>
      <button class="prop-btn" id="duplicate-object">Duplicate</button>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="status-item" id="status-msg">Ready — Select Rectangle, Rounded, or Circle</div>
  <div class="status-item"><b>Objects:</b> <span id="status-count">0</span></div>
  <div class="status-item"><b>Tool:</b> <span id="status-tool">Rectangle</span></div>
  <div class="status-item" id="status-coords"><b>Cursor:</b> 0, 0, 0</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // --- Setup ---
  const canvas = document.getElementById('draw-canvas');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0A0A0A);
  scene.fog = new THREE.FogExp2(0x0A0A0A, 0.002);
  
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
  camera.position.set(12, 10, 15);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  
  function resizeCanvas() {
    const w = canvas.parentElement.clientWidth;
    const h = canvas.parentElement.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  
  // --- Lighting ---
  const ambient = new THREE.AmbientLight(0x404060);
  scene.add(ambient);
  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(5, 12, 8);
  mainLight.castShadow = true;
  mainLight.receiveShadow = true;
  scene.add(mainLight);
  const fillLight = new THREE.PointLight(0x4466aa, 0.5);
  fillLight.position.set(-4, 5, 6);
  scene.add(fillLight);
  const backLight = new THREE.PointLight(0xffaa66, 0.4);
  backLight.position.set(0, 3, -8);
  scene.add(backLight);
  const rimLight = new THREE.PointLight(0xff8866, 0.3);
  rimLight.position.set(3, 4, -5);
  scene.add(rimLight);
  
  // --- Helpers ---
  const gridHelper = new THREE.GridHelper(50, 20, 0x444444, 0x222222);
  gridHelper.position.y = -0.5;
  scene.add(gridHelper);
  const axesHelper = new THREE.AxesHelper(8);
  scene.add(axesHelper);
  
  // Ground plane for reference
  const groundPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 50),
    new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.1, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
  );
  groundPlane.rotation.x = -Math.PI / 2;
  groundPlane.position.y = -0.5;
  groundPlane.receiveShadow = true;
  scene.add(groundPlane);
  
  // --- Data ---
  let objects = [];
  let selectedObject = null;
  let currentTool = 'rectangle';
  let isDrawing = false;
  let drawStart = { x: 0, z: 0 };
  let objectCounter = 0;
  let selectionMode = 'body'; // body, face, edge
  
  // --- Helper Functions ---
  function screenToGroundPlane(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const point = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, point);
    return { x: Math.round(point.x / 5) * 5, z: Math.round(point.z / 5) * 5 };
  }
  
  function createShapeMesh(type, x, z, width, height, radius) {
    let shape;
    const w = width;
    const h = height;
    const r = Math.min(radius, w/2, h/2);
    
    if (type === 'circle') {
      const curve = new THREE.EllipseCurve(0, 0, w/2, h/2, 0, 2 * Math.PI, false, 0);
      const points = curve.getPoints(50);
      shape = new THREE.Shape(points);
    } else if (type === 'rounded') {
      shape = new THREE.Shape();
      shape.moveTo(r, 0);
      shape.lineTo(w - r, 0);
      shape.quadraticCurveTo(w, 0, w, r);
      shape.lineTo(w, h - r);
      shape.quadraticCurveTo(w, h, w - r, h);
      shape.lineTo(r, h);
      shape.quadraticCurveTo(0, h, 0, h - r);
      shape.lineTo(0, r);
      shape.quadraticCurveTo(0, 0, r, 0);
    } else {
      shape = new THREE.Shape();
      shape.moveTo(0, 0);
      shape.lineTo(w, 0);
      shape.lineTo(w, h);
      shape.lineTo(0, h);
      shape.lineTo(0, 0);
    }
    
    const extrudeSettings = { steps: 1, depth: 10, bevelEnabled: false };
    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geometry.computeVertexNormals();
    geometry.computeBoundingBox();
    
    const material = new THREE.MeshStandardMaterial({ color: 0x4a7ac8, metalness: 0.4, roughness: 0.3 });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(x, 5, z);
    mesh.userData = {
      id: ++objectCounter,
      type: type,
      width: w,
      height: h,
      radius: radius,
      extrudeDepth: 10,
      originalShape: shape
    };
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }
  
  function addObject(type, x, z, w, h, r) {
    const mesh = createShapeMesh(type, x, z, w, h, r);
    scene.add(mesh);
    objects.push(mesh);
    selectObject(mesh);
    updateUI();
    setStatus(`Created ${type === 'rounded' ? 'Rounded Rectangle' : type} (${w}×${h})`);
  }
  
  function extrudeObject(obj, depth) {
    if (!obj) return false;
    const newGeo = new THREE.ExtrudeGeometry(obj.userData.originalShape, { steps: 1, depth: depth, bevelEnabled: false });
    newGeo.computeVertexNormals();
    newGeo.computeBoundingBox();
    obj.geometry.dispose();
    obj.geometry = newGeo;
    obj.userData.extrudeDepth = depth;
    obj.position.y = depth / 2;
    return true;
  }
  
  function selectObject(obj) {
    if (selectedObject) {
      selectedObject.material.emissiveIntensity = 0;
      selectedObject.material.color.setHex(selectedObject.userData.originalColor || 0x4a7ac8);
    }
    selectedObject = obj;
    if (obj) {
      obj.userData.originalColor = obj.material.color.getHex();
      obj.material.emissive = new THREE.Color(0x0A84FF);
      obj.material.emissiveIntensity = 0.3;
      updatePropertiesPanel(obj);
    } else {
      document.getElementById('selected-info').innerHTML = 'None';
      document.getElementById('prop-x').value = '';
      document.getElementById('prop-y').value = '';
      document.getElementById('prop-z').value = '';
      document.getElementById('prop-w').value = '';
      document.getElementById('prop-h').value = '';
      document.getElementById('prop-d').value = '';
    }
    updateUI();
  }
  
  function updatePropertiesPanel(obj) {
    document.getElementById('selected-info').innerHTML = `${obj.userData.type} #${obj.userData.id}`;
    document.getElementById('prop-x').value = Math.round(obj.position.x);
    document.getElementById('prop-y').value = Math.round(obj.position.y);
    document.getElementById('prop-z').value = Math.round(obj.position.z);
    document.getElementById('prop-w').value = obj.userData.width;
    document.getElementById('prop-h').value = obj.userData.height;
    document.getElementById('prop-d').value = obj.userData.extrudeDepth;
    if (obj.userData.type === 'rounded') {
      document.getElementById('prop-radius-row').style.display = 'flex';
      document.getElementById('prop-r').value = obj.userData.radius;
    } else {
      document.getElementById('prop-radius-row').style.display = 'none';
    }
  }
  
  function updateObjectDimensions(obj, w, h, depth, radius) {
    const newMesh = createShapeMesh(obj.userData.type, obj.position.x, obj.position.z, w, h, radius);
    newMesh.userData.extrudeDepth = depth;
    newMesh.position.y = depth / 2;
    extrudeObject(newMesh, depth);
    newMesh.material.color.setHex(obj.material.color.getHex());
    
    const idx = objects.indexOf(obj);
    scene.remove(obj);
    obj.geometry.dispose();
    obj.material.dispose();
    objects[idx] = newMesh;
    scene.add(newMesh);
    selectObject(newMesh);
    setStatus(`Updated dimensions to ${w}×${h}×${depth}`);
  }
  
  function deleteObject(obj) {
    const idx = objects.indexOf(obj);
    if (idx >= 0) {
      scene.remove(obj);
      obj.geometry.dispose();
      obj.material.dispose();
      objects.splice(idx, 1);
      if (selectedObject === obj) selectObject(null);
      updateUI();
      setStatus('Object deleted');
    }
  }
  
  function clearAll() {
    objects.forEach(obj => {
      scene.remove(obj);
      obj.geometry.dispose();
      obj.material.dispose();
    });
    objects = [];
    selectObject(null);
    updateUI();
    setStatus('All objects cleared');
  }
  
  function duplicateObject() {
    if (!selectedObject) { setStatus('No object selected'); return; }
    const orig = selectedObject;
    const newMesh = createShapeMesh(orig.userData.type, orig.position.x + 30, orig.position.z + 30, orig.userData.width, orig.userData.height, orig.userData.radius);
    newMesh.userData.extrudeDepth = orig.userData.extrudeDepth;
    newMesh.position.y = orig.userData.extrudeDepth / 2;
    extrudeObject(newMesh, orig.userData.extrudeDepth);
    newMesh.material.color.setHex(orig.material.color.getHex());
    scene.add(newMesh);
    objects.push(newMesh);
    selectObject(newMesh);
    setStatus('Duplicated');
  }
  
  function updateUI() {
    const listEl = document.getElementById('objects-list');
    listEl.innerHTML = '';
    objects.forEach((obj, idx) => {
      const div = document.createElement('div');
      div.className = 'object-item' + (selectedObject === obj ? ' selected' : '');
      const icon = obj.userData.type === 'circle' ? '●' : (obj.userData.type === 'rounded' ? '⭔' : '⬛');
      div.innerHTML = `
        <div class="object-icon">${icon}</div>
        <div class="object-info"><div class="object-name">${obj.userData.type} #${obj.userData.id}</div><div class="object-type">${obj.userData.width}×${obj.userData.height}×${obj.userData.extrudeDepth}</div></div>
        <button class="object-delete" data-idx="${idx}">✕</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('object-delete')) {
          e.stopPropagation();
          deleteObject(objects[idx]);
        } else {
          selectObject(objects[idx]);
        }
      });
      listEl.appendChild(div);
    });
    document.getElementById('object-count').innerText = objects.length;
    document.getElementById('status-count').innerText = objects.length;
    document.getElementById('status-tool').innerText = 
      currentTool === 'rectangle' ? 'Rectangle' : (currentTool === 'rounded' ? 'Rounded' : (currentTool === 'circle' ? 'Circle' : 'Select'));
  }
  
  function setStatus(msg) {
    const el = document.getElementById('status-msg');
    el.innerHTML = msg;
    setTimeout(() => {
      if (document.getElementById('status-msg').innerHTML === msg) {
        document.getElementById('status-msg').innerHTML = 'Ready';
      }
    }, 2000);
  }
  
  // --- View Controls ---
  const views = {
    top: { pos: [0, 25, 0.01], target: [0, 0, 0], up: [0, 0, -1] },
    bottom: { pos: [0, -25, 0.01], target: [0, 0, 0], up: [0, 0, 1] },
    front: { pos: [0, 0, 25], target: [0, 0, 0], up: [0, 1, 0] },
    back: { pos: [0, 0, -25], target: [0, 0, 0], up: [0, 1, 0] },
    left: { pos: [-25, 0, 0], target: [0, 0, 0], up: [0, 1, 0] },
    right: { pos: [25, 0, 0], target: [0, 0, 0], up: [0, 1, 0] },
    persp: { pos: [12, 10, 15], target: [0, 0, 0], up: [0, 1, 0] }
  };
  
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = views[btn.dataset.view];
      if (v) {
        camera.position.set(v.pos[0], v.pos[1], v.pos[2]);
        camera.up.set(v.up[0], v.up[1], v.up[2]);
        camera.lookAt(v.target[0], v.target[1], v.target[2]);
        document.getElementById('view-label').innerHTML = btn.dataset.view.toUpperCase();
        setStatus(`View: ${btn.dataset.view}`);
      }
    });
  });
  
  // --- Mouse Events for Drawing and Selection ---
  let lastMousePos = { x: 0, y: 0 };
  let isPanning = false;
  let panStart = { x: 0, y: 0 };
  
  renderer.domElement.addEventListener('mousedown', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    if (e.button === 1 || e.shiftKey) {
      isPanning = true;
      panStart = { x: mouseX, y: mouseY };
      return;
    }
    
    if (currentTool === 'select') {
      const mouse = new THREE.Vector2();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(objects);
      if (intersects.length > 0) {
        selectObject(intersects[0].object);
      } else {
        selectObject(null);
      }
    } else if (currentTool === 'rectangle' || currentTool === 'rounded' || currentTool === 'circle') {
      isDrawing = true;
      drawStart = screenToGroundPlane(e.clientX, e.clientY);
    }
  });
  
  renderer.domElement.addEventListener('mousemove', (e) => {
    const world = screenToGroundPlane(e.clientX, e.clientY);
    document.getElementById('status-coords').innerHTML = `<b>Cursor:</b> ${world.x}, 0, ${world.z}`;
    
    if (isPanning) {
      const dx = e.clientX - (panStart.x + renderer.domElement.getBoundingClientRect().left);
      const dy = e.clientY - (panStart.y + renderer.domElement.getBoundingClientRect().top);
      camera.position.x -= dx * 0.03;
      camera.position.y += dy * 0.03;
      camera.lookAt(0, 0, 0);
      panStart = { x: e.clientX - renderer.domElement.getBoundingClientRect().left, y: e.clientY - renderer.domElement.getBoundingClientRect().top };
    }
  });
  
  renderer.domElement.addEventListener('mouseup', (e) => {
    if (isPanning) {
      isPanning = false;
      return;
    }
    
    if (isDrawing && (currentTool === 'rectangle' || currentTool === 'rounded' || currentTool === 'circle')) {
      const end = screenToGroundPlane(e.clientX, e.clientY);
      const w = Math.abs(end.x - drawStart.x);
      const h = Math.abs(end.z - drawStart.z);
      const x = Math.min(drawStart.x, end.x) + w/2;
      const z = Math.min(drawStart.z, end.z) + h/2;
      if (w > 10 && h > 10) {
        const radius = parseInt(document.getElementById('hud-r').value) || 20;
        addObject(currentTool, x, z, w, h, radius);
      }
      isDrawing = false;
    }
  });
  
  renderer.domElement.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 1.05 : 0.95;
    const distance = camera.position.length();
    const newDistance = Math.max(5, Math.min(40, distance * delta));
    camera.position.multiplyScalar(newDistance / distance);
    camera.lookAt(0, 0, 0);
  });
  
  // --- Keyboard Shortcuts ---
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Delete' && selectedObject) deleteObject(selectedObject);
    if (e.key === 'Escape') selectObject(null);
    if (e.key === 'r' || e.key === 'R') { currentTool = 'rectangle'; updateToolUI(); setStatus('Tool: Rectangle'); }
    if (e.key === 'c' || e.key === 'C') { currentTool = 'circle'; updateToolUI(); setStatus('Tool: Circle'); }
    if (e.key === 'u' || e.key === 'U') { currentTool = 'rounded'; updateToolUI(); setStatus('Tool: Rounded Rectangle'); }
    if (e.key === 's' || e.key === 'S') { currentTool = 'select'; updateToolUI(); setStatus('Tool: Select'); }
    if (e.key === 'e' || e.key === 'E') { 
      if (selectedObject) {
        const depth = parseInt(document.getElementById('extrude-height').value) || 40;
        extrudeObject(selectedObject, depth);
        selectedObject.position.y = depth / 2;
        updatePropertiesPanel(selectedObject);
        setStatus(`Extruded to ${depth}mm`);
      } else setStatus('Select an object first');
    }
  });
  
  function updateToolUI() {
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    if (currentTool === 'rectangle') document.getElementById('tool-rectangle').classList.add('active');
    if (currentTool === 'rounded') document.getElementById('tool-rounded').classList.add('active');
    if (currentTool === 'circle') document.getElementById('tool-circle').classList.add('active');
    if (currentTool === 'select') document.getElementById('tool-select').classList.add('active');
    updateUI();
  }
  
  // --- Button Event Listeners ---
  document.getElementById('tool-rectangle').onclick = () => { currentTool = 'rectangle'; updateToolUI(); setStatus('Rectangle tool — click and drag to draw'); };
  document.getElementById('tool-rounded').onclick = () => { currentTool = 'rounded'; updateToolUI(); setStatus('Rounded Rectangle tool — click and drag to draw'); };
  document.getElementById('tool-circle').onclick = () => { currentTool = 'circle'; updateToolUI(); setStatus('Circle tool — click and drag to draw'); };
  document.getElementById('tool-select').onclick = () => { currentTool = 'select'; updateToolUI(); setStatus('Select tool — click objects to select'); };
  document.getElementById('tool-extrude').onclick = () => {
    if (selectedObject) {
      const depth = parseInt(document.getElementById('extrude-height').value) || 40;
      extrudeObject(selectedObject, depth);
      selectedObject.position.y = depth / 2;
      updatePropertiesPanel(selectedObject);
      setStatus(`Extruded to ${depth}mm`);
    } else setStatus('Select an object first');
  };
  document.getElementById('apply-extrude-btn').onclick = () => {
    if (selectedObject) {
      const depth = parseInt(document.getElementById('extrude-height').value) || 40;
      extrudeObject(selectedObject, depth);
      selectedObject.position.y = depth / 2;
      updatePropertiesPanel(selectedObject);
      setStatus(`Extruded to ${depth}mm`);
    } else setStatus('Select an object first');
  };
  document.getElementById('action-delete').onclick = () => { if (selectedObject) deleteObject(selectedObject); else setStatus('No object selected'); };
  document.getElementById('action-clear').onclick = clearAll;
  document.getElementById('delete-selected').onclick = () => { if (selectedObject) deleteObject(selectedObject); else setStatus('No object selected'); };
  document.getElementById('duplicate-object').onclick = duplicateObject;
  
  document.getElementById('apply-pos').onclick = () => {
    if (selectedObject) {
      selectedObject.position.x = parseInt(document.getElementById('prop-x').value) || 0;
      selectedObject.position.y = parseInt(document.getElementById('prop-y').value) || 0;
      selectedObject.position.z = parseInt(document.getElementById('prop-z').value) || 0;
      setStatus('Position updated');
    }
  };
  document.getElementById('apply-dims').onclick = () => {
    if (selectedObject) {
      const w = parseInt(document.getElementById('prop-w').value) || 80;
      const h = parseInt(document.getElementById('prop-h').value) || 80;
      const d = parseInt(document.getElementById('prop-d').value) || 40;
      const r = parseInt(document.getElementById('prop-r').value) || 20;
      updateObjectDimensions(selectedObject, w, h, d, r);
    }
  };
  document.getElementById('apply-color').onclick = () => {
    if (selectedObject) {
      const color = document.getElementById('prop-color').value;
      selectedObject.material.color.set(color);
      setStatus('Color applied');
    }
  };
  
  // Selection mode buttons
  document.getElementById('sel-body').onclick = () => { selectionMode = 'body'; document.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active')); document.getElementById('sel-body').classList.add('active'); setStatus('Selection mode: Body'); };
  document.getElementById('sel-face').onclick = () => { selectionMode = 'face'; document.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active')); document.getElementById('sel-face').classList.add('active'); setStatus('Face selection (click on object faces)'); };
  document.getElementById('sel-edge').onclick = () => { selectionMode = 'edge'; document.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active')); document.getElementById('sel-edge').classList.add('active'); setStatus('Edge selection'); };
  
  // Menu items (working)
  document.getElementById('menu-file').onclick = () => setStatus('File — Export STL feature coming soon');
  document.getElementById('menu-edit').onclick = () => setStatus('Edit — Duplicate (Ctrl+D), Delete (Del)');
  document.getElementById('menu-view').onclick = () => {
    camera.position.set(12, 10, 15);
    camera.lookAt(0, 0, 0);
    setStatus('View reset to perspective');
  };
  
  // Hide radius group initially
  document.getElementById('radius-group').style.display = 'flex';
  
  // --- Demo Objects ---
  setTimeout(() => {
    const r1 = createShapeMesh('rectangle', -50, -40, 70, 70, 0);
    extrudeObject(r1, 30);
    r1.position.y = 15;
    scene.add(r1);
    objects.push(r1);
    
    const r2 = createShapeMesh('rounded', 40, -35, 80, 80, 20);
    extrudeObject(r2, 35);
    r2.position.y = 17.5;
    scene.add(r2);
    objects.push(r2);
    
    const r3 = createShapeMesh('circle', -10, 50, 65, 65, 0);
    extrudeObject(r3, 25);
    r3.position.y = 12.5;
    scene.add(r3);
    objects.push(r3);
    
    updateUI();
    setStatus('Welcome! Draw rectangles, rounded rects, or circles → Select → Extrude');
  }, 100);
  
  // --- Animation Loop ---
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherCAD — Professional 3D Design Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

:root {
  --bg: #0D0D0F;
  --bg2: #141416;
  --bg3: #1C1C1F;
  --bg4: #242428;
  --accent: #0A84FF;
  --accent-glow: rgba(10,132,255,0.3);
  --green: #30D158;
  --red: #FF453A;
  --text: #E8E8EA;
  --text2: #8E8E96;
  --border: #2A2A2F;
}

body, html {
  height: 100%;
  overflow: hidden;
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
}

button {
  font-family: inherit;
  cursor: pointer;
  background: none;
  border: none;
  color: inherit;
}

input {
  font-family: 'JetBrains Mono', monospace;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Simple clean header - no broken menus */
#header {
  height: 48px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  flex-shrink: 0;
}

.logo {
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.5px;
}

.logo em {
  color: var(--accent);
  font-style: normal;
}

.status-badge {
  margin-left: auto;
  display: flex;
  gap: 12px;
}

.badge {
  font-size: 10px;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}

.badge.active {
  color: var(--green);
  border-color: var(--green);
}

/* Toolbar */
#toolbar {
  height: 70px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 8px;
  flex-shrink: 0;
}

.tool-group {
  display: flex;
  gap: 6px;
  padding: 0 15px;
  border-right: 1px solid var(--border);
}

.tool-group:last-child {
  border-right: none;
}

.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 6px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-size: 10px;
  font-weight: 500;
  min-width: 70px;
  transition: all 0.1s;
}

.tool-btn:hover {
  background: var(--bg4);
  border-color: var(--accent);
  color: var(--text);
}

.tool-btn.active {
  background: rgba(10,132,255,0.2);
  border-color: var(--accent);
  color: var(--accent);
}

.tool-icon {
  font-size: 18px;
}

/* Main layout */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left Panel */
#left-panel {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text2);
  display: flex;
  justify-content: space-between;
}

#object-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.object-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 4px;
  border: 1px solid transparent;
  transition: all 0.1s;
}

.object-item:hover {
  background: var(--bg3);
  border-color: var(--border);
}

.object-item.selected {
  background: rgba(10,132,255,0.15);
  border-color: var(--accent);
}

.object-icon {
  font-size: 16px;
}

.object-name {
  font-size: 12px;
  font-weight: 500;
}

.object-info {
  font-size: 9px;
  color: var(--text2);
  font-family: monospace;
}

.delete-btn {
  margin-left: auto;
  opacity: 0;
  color: var(--red);
  padding: 4px 8px;
  border-radius: 5px;
}

.object-item:hover .delete-btn {
  opacity: 1;
}

.empty-state {
  text-align: center;
  padding: 30px;
  color: var(--text2);
  font-size: 11px;
}

/* Viewport */
#viewport {
  flex: 1;
  position: relative;
  background: #0A0A0B;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Transform HUD */
#transform-hud {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,28,0.95);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 40px;
  display: flex;
  z-index: 20;
}

.transform-btn {
  padding: 8px 24px;
  font-size: 12px;
  font-weight: 600;
  border: none;
  background: none;
  color: var(--text2);
  cursor: pointer;
  border-radius: 40px;
}

.transform-btn.active {
  background: var(--accent);
  color: white;
}

/* Draw HUD */
#draw-hud {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,28,0.95);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 50px;
  display: flex;
  align-items: center;
  padding: 8px 24px;
  gap: 20px;
  z-index: 20;
}

.draw-control {
  display: flex;
  align-items: center;
  gap: 8px;
}

.draw-control label {
  font-size: 11px;
  color: var(--text2);
}

.draw-control input {
  width: 70px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 11px;
  color: var(--text);
}

.extrude-btn {
  background: var(--accent);
  border: none;
  padding: 6px 20px;
  border-radius: 30px;
  color: white;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
}

/* Right Panel */
#right-panel {
  width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}

.section {
  border-bottom: 1px solid var(--border);
}

.section-title {
  padding: 10px 16px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text2);
  background: var(--bg3);
}

.section-content {
  padding: 12px 16px;
}

.property-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.property-row label {
  width: 35px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
}

.property-row input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 11px;
  color: var(--text);
}

.apply-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  padding: 8px;
  border-radius: 8px;
  color: white;
  font-weight: 600;
  font-size: 11px;
  margin-top: 8px;
  cursor: pointer;
}

.secondary-btn {
  width: 100%;
  background: var(--bg4);
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 8px;
  color: var(--text);
  font-size: 11px;
  margin-top: 6px;
  cursor: pointer;
}

.info-box {
  background: var(--bg3);
  border-radius: 8px;
  padding: 10px;
  font-family: monospace;
  font-size: 10px;
  border-left: 3px solid var(--accent);
}

/* Status bar */
#status-bar {
  height: 28px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  font-size: 10px;
  font-family: monospace;
  color: var(--text2);
}

#status-message {
  flex: 1;
}

/* Draw preview */
#draw-preview {
  position: absolute;
  border: 2px solid var(--accent);
  background: rgba(10,132,255,0.1);
  pointer-events: none;
  display: none;
  z-index: 15;
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">Aether<em>CAD</em></div>
    <div class="status-badge">
      <div class="badge active">● READY</div>
    </div>
  </div>

  <div id="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" id="tool-rect"><span class="tool-icon">□</span>Rectangle</button>
      <button class="tool-btn" id="tool-round"><span class="tool-icon">◧</span>Rounded</button>
      <button class="tool-btn" id="tool-circle"><span class="tool-icon">●</span>Circle</button>
    </div>
    <div class="tool-group">
      <button class="tool-btn" id="tool-select"><span class="tool-icon">🖱</span>Select</button>
      <button class="tool-btn" id="tool-move"><span class="tool-icon">✥</span>Move</button>
      <button class="tool-btn" id="tool-rotate"><span class="tool-icon">↻</span>Rotate</button>
      <button class="tool-btn" id="tool-scale"><span class="tool-icon">⤢</span>Scale</button>
    </div>
    <div class="tool-group">
      <button class="tool-btn" id="tool-duplicate"><span class="tool-icon">⧉</span>Duplicate</button>
      <button class="tool-btn" id="tool-delete"><span class="tool-icon">🗑</span>Delete</button>
      <button class="tool-btn" id="tool-clear"><span class="tool-icon">✕</span>Clear All</button>
    </div>
  </div>

  <div id="main">
    <div id="left-panel">
      <div class="panel-header">
        <span>📦 OBJECTS</span>
        <span id="object-count">0</span>
      </div>
      <div id="object-list">
        <div class="empty-state">No objects<br>Draw a shape on the canvas</div>
      </div>
    </div>

    <div id="viewport">
      <canvas id="canvas"></canvas>
      <div id="draw-preview"></div>
      <div id="transform-hud">
        <button class="transform-btn active" data-mode="select">SELECT</button>
        <button class="transform-btn" data-mode="translate">MOVE</button>
        <button class="transform-btn" data-mode="rotate">ROTATE</button>
        <button class="transform-btn" data-mode="scale">SCALE</button>
      </div>
      <div id="draw-hud">
        <div class="draw-control"><label>W</label><input type="number" id="draw-width" value="80" step="10"></div>
        <div class="draw-control"><label>D</label><input type="number" id="draw-depth" value="80" step="10"></div>
        <div class="draw-control" id="radius-control"><label>R</label><input type="number" id="draw-radius" value="15" step="5"></div>
        <div class="draw-control"><label>Height</label><input type="number" id="draw-height" value="40" step="5"></div>
        <button class="extrude-btn" id="apply-extrude">EXTRUDE</button>
      </div>
    </div>

    <div id="right-panel">
      <div class="section">
        <div class="section-title">📐 SELECTION</div>
        <div class="section-content">
          <div class="info-box" id="selection-info">No object selected</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📍 POSITION</div>
        <div class="section-content">
          <div class="property-row"><label>X</label><input type="number" id="pos-x" step="5"></div>
          <div class="property-row"><label>Y</label><input type="number" id="pos-y" step="5"></div>
          <div class="property-row"><label>Z</label><input type="number" id="pos-z" step="5"></div>
          <button class="apply-btn" id="apply-position">APPLY</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">↻ ROTATION</div>
        <div class="section-content">
          <div class="property-row"><label>X</label><input type="number" id="rot-x" step="15"></div>
          <div class="property-row"><label>Y</label><input type="number" id="rot-y" step="15"></div>
          <div class="property-row"><label>Z</label><input type="number" id="rot-z" step="15"></div>
          <button class="apply-btn" id="apply-rotation">APPLY</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📏 DIMENSIONS</div>
        <div class="section-content">
          <div class="property-row"><label>W</label><input type="number" id="dim-w" step="5"></div>
          <div class="property-row"><label>D</label><input type="number" id="dim-d" step="5"></div>
          <div class="property-row"><label>H</label><input type="number" id="dim-h" step="5"></div>
          <div class="property-row" id="dim-radius-row"><label>R</label><input type="number" id="dim-r" step="5"></div>
          <button class="apply-btn" id="apply-dimensions">REBUILD</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">🎨 COLOR</div>
        <div class="section-content">
          <div class="property-row"><label>Color</label><input type="color" id="color-picker" value="#4a7ac8"></div>
          <button class="apply-btn" id="apply-color">APPLY</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">⚡ OPERATIONS</div>
        <div class="section-content">
          <button class="secondary-btn" id="op-duplicate">Duplicate</button>
          <button class="secondary-btn" id="op-snap-ground">Snap to Ground</button>
          <button class="secondary-btn" id="op-center">Center on Grid</button>
        </div>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-message">Ready — Click and drag to draw shapes</span>
    <span>Objects: <span id="stat-count">0</span></span>
    <span>Tool: <span id="stat-tool">Rectangle</span></span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ========== INITIALIZATION ==========
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0A0A0B);
scene.fog = new THREE.FogExp2(0x0A0A0B, 0.0002);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(250, 200, 350);
camera.lookAt(0, 50, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
renderer.shadowMap.enabled = true;
renderer.setPixelRatio(window.devicePixelRatio);

// ========== LIGHTING ==========
const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.5);
mainLight.position.set(150, 300, 100);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 800;
mainLight.shadow.camera.left = -200;
mainLight.shadow.camera.right = 200;
mainLight.shadow.camera.top = 200;
mainLight.shadow.camera.bottom = -200;
scene.add(mainLight);

const fillLight = new THREE.PointLight(0x4488ff, 0.6);
fillLight.position.set(-100, 100, 150);
scene.add(fillLight);

const backLight = new THREE.PointLight(0xffaa66, 0.5);
backLight.position.set(50, 80, -200);
scene.add(backLight);

// ========== GROUND & GRID ==========
const gridHelper = new THREE.GridHelper(1200, 60, 0x4a4a55, 0x2a2a35);
gridHelper.position.y = -0.5;
scene.add(gridHelper);

const groundPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshStandardMaterial({ color: 0x0c0c10, roughness: 0.8, metalness: 0.1 })
);
groundPlane.rotation.x = -Math.PI / 2;
groundPlane.position.y = -0.8;
groundPlane.receiveShadow = true;
scene.add(groundPlane);

// Axis helper (subtle)
const axesHelper = new THREE.AxesHelper(80);
axesHelper.material.transparent = true;
axesHelper.material.opacity = 0.15;
scene.add(axesHelper);

// ========== CONTROLS ==========
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.05;
orbitControls.rotateSpeed = 1.2;
orbitControls.zoomSpeed = 1.2;
orbitControls.panSpeed = 0.8;
orbitControls.target.set(0, 50, 0);

const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.addEventListener('dragging-changed', (e) => {
  orbitControls.enabled = !e.value;
});
transformControls.addEventListener('objectChange', () => {
  updatePropertyPanel();
});
scene.add(transformControls);

// ========== STATE ==========
let objects = [];
let selectedObject = null;
let nextId = 1;
let currentDrawType = 'rect';
let isDrawing = false;
let drawStartPoint = null;
let currentTransformMode = 'select';

// ========== UTILITY FUNCTIONS ==========
function setStatus(message) {
  document.getElementById('status-message').textContent = message;
}

function getGroundPointFromMouse(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((event.clientX - rect.left) / rect.width) * 2 - 1,
    -((event.clientY - rect.top) / rect.height) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const intersection = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(plane, intersection)) {
    return { x: Math.round(intersection.x / 10) * 10, z: Math.round(intersection.z / 10) * 10 };
  }
  return null;
}

// ========== GEOMETRY BUILDER ==========
function buildExtrudedGeometry(type, width, depth, height, cornerRadius = 15) {
  const w = Math.max(10, width);
  const d = Math.max(10, depth);
  const h = Math.max(2, height);
  const halfW = w / 2;
  const halfD = d / 2;
  
  const shape = new THREE.Shape();
  
  if (type === 'circle') {
    const segments = 64;
    for (let i = 0; i <= segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const x = Math.cos(angle) * halfW;
      const z = Math.sin(angle) * halfD;
      if (i === 0) shape.moveTo(x, z);
      else shape.lineTo(x, z);
    }
    shape.closePath();
  } 
  else if (type === 'round') {
    const r = Math.min(Math.abs(cornerRadius), halfW * 0.45, halfD * 0.45);
    shape.moveTo(-halfW + r, -halfD);
    shape.lineTo(halfW - r, -halfD);
    shape.quadraticCurveTo(halfW, -halfD, halfW, -halfD + r);
    shape.lineTo(halfW, halfD - r);
    shape.quadraticCurveTo(halfW, halfD, halfW - r, halfD);
    shape.lineTo(-halfW + r, halfD);
    shape.quadraticCurveTo(-halfW, halfD, -halfW, halfD - r);
    shape.lineTo(-halfW, -halfD + r);
    shape.quadraticCurveTo(-halfW, -halfD, -halfW + r, -halfD);
  } 
  else {
    shape.moveTo(-halfW, -halfD);
    shape.lineTo(halfW, -halfD);
    shape.lineTo(halfW, halfD);
    shape.lineTo(-halfW, halfD);
    shape.closePath();
  }
  
  const extrudeSettings = {
    steps: 1,
    depth: h,
    bevelEnabled: true,
    bevelThickness: 1,
    bevelSize: 0.8,
    bevelSegments: 3
  };
  
  const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  geometry.computeVertexNormals();
  geometry.rotateX(-Math.PI / 2);
  geometry.computeBoundingBox();
  
  return geometry;
}

// ========== CREATE OBJECT ==========
function createObject(type, centerX, centerZ, width, depth, height, radius = 15) {
  const geometry = buildExtrudedGeometry(type, width, depth, height, radius);
  const material = new THREE.MeshStandardMaterial({
    color: 0x4a7ac8,
    metalness: 0.45,
    roughness: 0.35,
    emissive: 0x000000
  });
  
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(centerX, 0, centerZ);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = {
    id: nextId++,
    type: type,
    width: width,
    depth: depth,
    height: height,
    cornerRadius: radius,
    originalColor: 0x4a7ac8
  };
  mesh.name = `${type}_${mesh.userData.id}`;
  
  scene.add(mesh);
  objects.push(mesh);
  selectObject(mesh);
  updateObjectList();
  setStatus(`Created: ${mesh.name}`);
  return mesh;
}

// ========== EXTRUDE SELECTED ==========
function extrudeSelected(newHeight) {
  if (!selectedObject) {
    setStatus('No object selected');
    return;
  }
  
  const ud = selectedObject.userData;
  const newH = Math.max(2, newHeight);
  const newGeo = buildExtrudedGeometry(ud.type, ud.width, ud.depth, newH, ud.cornerRadius);
  
  const oldMat = selectedObject.material;
  selectedObject.geometry.dispose();
  selectedObject.geometry = newGeo;
  ud.height = newH;
  
  updatePropertyPanel();
  setStatus(`Extruded to ${newH} units`);
}

// ========== REBUILD DIMENSIONS ==========
function rebuildDimensions(width, depth, height, radius) {
  if (!selectedObject) return;
  
  const ud = selectedObject.userData;
  const newW = Math.max(10, width);
  const newD = Math.max(10, depth);
  const newH = Math.max(2, height);
  const newR = (ud.type === 'round') ? Math.max(2, radius) : ud.cornerRadius;
  
  const newGeo = buildExtrudedGeometry(ud.type, newW, newD, newH, newR);
  selectedObject.geometry.dispose();
  selectedObject.geometry = newGeo;
  
  ud.width = newW;
  ud.depth = newD;
  ud.height = newH;
  if (ud.type === 'round') ud.cornerRadius = newR;
  
  updatePropertyPanel();
  setStatus(`Dimensions updated: ${newW} x ${newD} x ${newH}`);
}

// ========== SELECTION ==========
function selectObject(obj) {
  // Remove highlight from previous selection
  if (selectedObject) {
    if (selectedObject.material) {
      selectedObject.material.emissiveIntensity = 0;
    }
  }
  
  selectedObject = obj;
  
  if (obj) {
    // Highlight selected object
    obj.material.emissiveIntensity = 0.35;
    obj.material.emissive = new THREE.Color(0x2266ff);
    transformControls.attach(obj);
    setTransformMode(currentTransformMode);
    setStatus(`Selected: ${obj.name}`);
  } else {
    transformControls.detach();
    setStatus('Selection cleared');
  }
  
  updateObjectList();
  updatePropertyPanel();
}

// ========== DELETE OBJECT ==========
function deleteObject(obj) {
  if (!obj) return;
  
  const index = objects.indexOf(obj);
  if (index !== -1) objects.splice(index, 1);
  
  scene.remove(obj);
  if (obj.geometry) obj.geometry.dispose();
  if (obj.material) obj.material.dispose();
  
  if (selectedObject === obj) {
    selectObject(null);
  }
  
  updateObjectList();
  setStatus(`Deleted: ${obj.name}`);
}

function deleteSelected() {
  if (selectedObject) {
    deleteObject(selectedObject);
  }
}

function clearAll() {
  objects.forEach(obj => {
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
  });
  objects = [];
  selectObject(null);
  updateObjectList();
  setStatus('Cleared all objects');
}

function duplicateSelected() {
  if (!selectedObject) {
    setStatus('No object selected');
    return;
  }
  
  const orig = selectedObject;
  const ud = orig.userData;
  const newGeo = buildExtrudedGeometry(ud.type, ud.width, ud.depth, ud.height, ud.cornerRadius);
  const newMat = new THREE.MeshStandardMaterial().copy(orig.material);
  const clone = new THREE.Mesh(newGeo, newMat);
  
  clone.position.copy(orig.position);
  clone.position.x += 50;
  clone.castShadow = true;
  clone.userData = {
    ...ud,
    id: nextId++,
    originalColor: ud.originalColor
  };
  clone.name = `${ud.type}_${clone.userData.id}`;
  
  scene.add(clone);
  objects.push(clone);
  selectObject(clone);
  updateObjectList();
  setStatus(`Duplicated: ${clone.name}`);
}

// ========== UI UPDATE ==========
function updateObjectList() {
  const container = document.getElementById('object-list');
  const countSpan = document.getElementById('object-count');
  const statCount = document.getElementById('stat-count');
  
  countSpan.textContent = objects.length;
  statCount.textContent = objects.length;
  
  if (objects.length === 0) {
    container.innerHTML = '<div class="empty-state">No objects<br>Draw a shape on the canvas</div>';
    return;
  }
  
  container.innerHTML = '';
  objects.forEach(obj => {
    const div = document.createElement('div');
    div.className = `object-item ${selectedObject === obj ? 'selected' : ''}`;
    const icon = obj.userData.type === 'rect' ? '□' : (obj.userData.type === 'round' ? '◧' : '●');
    div.innerHTML = `
      <span class="object-icon">${icon}</span>
      <div>
        <div class="object-name">${obj.name}</div>
        <div class="object-info">${obj.userData.width} x ${obj.userData.depth}  H:${obj.userData.height}</div>
      </div>
      <button class="delete-btn" data-id="${obj.userData.id}">✕</button>
    `;
    
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) {
        e.stopPropagation();
        deleteObject(obj);
      } else {
        selectObject(obj);
      }
    });
    container.appendChild(div);
  });
}

function updatePropertyPanel() {
  if (!selectedObject) {
    document.getElementById('selection-info').innerHTML = 'No object selected';
    document.getElementById('pos-x').value = '';
    document.getElementById('pos-y').value = '';
    document.getElementById('pos-z').value = '';
    document.getElementById('rot-x').value = '';
    document.getElementById('rot-y').value = '';
    document.getElementById('rot-z').value = '';
    document.getElementById('dim-w').value = '';
    document.getElementById('dim-d').value = '';
    document.getElementById('dim-h').value = '';
    return;
  }
  
  const pos = selectedObject.position;
  const rot = selectedObject.rotation;
  const ud = selectedObject.userData;
  
  document.getElementById('selection-info').innerHTML = `<b>${selectedObject.name}</b><br>Type: ${ud.type} | ${ud.width}×${ud.depth}×${ud.height}`;
  document.getElementById('pos-x').value = pos.x.toFixed(1);
  document.getElementById('pos-y').value = pos.y.toFixed(1);
  document.getElementById('pos-z').value = pos.z.toFixed(1);
  document.getElementById('rot-x').value = (rot.x * 180 / Math.PI).toFixed(0);
  document.getElementById('rot-y').value = (rot.y * 180 / Math.PI).toFixed(0);
  document.getElementById('rot-z').value = (rot.z * 180 / Math.PI).toFixed(0);
  document.getElementById('dim-w').value = ud.width;
  document.getElementById('dim-d').value = ud.depth;
  document.getElementById('dim-h').value = ud.height;
  
  const radiusRow = document.getElementById('dim-radius-row');
  if (ud.type === 'round') {
    radiusRow.style.display = 'flex';
    document.getElementById('dim-r').value = ud.cornerRadius || 15;
  } else {
    radiusRow.style.display = 'none';
  }
  
  if (selectedObject.material) {
    const colorHex = '#' + selectedObject.material.color.getHexString();
    document.getElementById('color-picker').value = colorHex;
  }
}

// ========== TRANSFORM MODE ==========
function setTransformMode(mode) {
  currentTransformMode = mode;
  if (!selectedObject) return;
  
  if (mode === 'select') transformControls.setMode('translate');
  else if (mode === 'translate') transformControls.setMode('translate');
  else if (mode === 'rotate') transformControls.setMode('rotate');
  else if (mode === 'scale') transformControls.setMode('scale');
  
  document.querySelectorAll('.transform-btn').forEach(btn => {
    if (btn.dataset.mode === mode) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

// ========== DRAW TOOL ==========
function setDrawTool(tool) {
  currentDrawType = tool;
  setTransformMode('select');
  
  document.querySelectorAll('#tool-rect, #tool-round, #tool-circle').forEach(btn => {
    btn.classList.remove('active');
  });
  
  if (tool === 'rect') document.getElementById('tool-rect').classList.add('active');
  if (tool === 'round') document.getElementById('tool-round').classList.add('active');
  if (tool === 'circle') document.getElementById('tool-circle').classList.add('active');
  
  const radiusControl = document.getElementById('radius-control');
  radiusControl.style.display = tool === 'round' ? 'flex' : 'none';
  
  const toolName = tool === 'rect' ? 'Rectangle' : (tool === 'round' ? 'Rounded' : 'Circle');
  document.getElementById('stat-tool').textContent = toolName;
  setStatus(`${toolName} mode — click and drag on canvas to draw`);
}

// ========== DRAWING HANDLERS ==========
const previewDiv = document.getElementById('draw-preview');

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (transformControls.dragging) return;
  
  isDrawing = true;
  drawStartPoint = getGroundPointFromMouse(e);
  
  if (drawStartPoint) {
    orbitControls.enabled = false;
    previewDiv.style.display = 'block';
    previewDiv.style.left = `${e.clientX}px`;
    previewDiv.style.top = `${e.clientY}px`;
    previewDiv.style.width = '0px';
    previewDiv.style.height = '0px';
  }
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDrawing || !drawStartPoint) return;
  
  const currentPoint = getGroundPointFromMouse(e);
  if (!currentPoint) return;
  
  const width = Math.abs(currentPoint.x - drawStartPoint.x);
  const depth = Math.abs(currentPoint.z - drawStartPoint.z);
  
  if (width > 5) document.getElementById('draw-width').value = Math.max(20, width);
  if (depth > 5) document.getElementById('draw-depth').value = Math.max(20, depth);
  
  // Update preview rectangle position
  const rect = renderer.domElement.getBoundingClientRect();
  previewDiv.style.left = `${Math.min(e.clientX, e.clientX - (currentPoint.x - drawStartPoint.x))}px`;
  previewDiv.style.top = `${Math.min(e.clientY, e.clientY - (currentPoint.z - drawStartPoint.z))}px`;
  previewDiv.style.width = `${Math.abs(currentPoint.x - drawStartPoint.x) * (rect.width / 800)}px`;
  previewDiv.style.height = `${Math.abs(currentPoint.z - drawStartPoint.z) * (rect.height / 600)}px`;
});

renderer.domElement.addEventListener('mouseup', (e) => {
  if (!isDrawing || !drawStartPoint) {
    isDrawing = false;
    return;
  }
  
  const endPoint = getGroundPointFromMouse(e);
  if (endPoint) {
    let width = Math.abs(endPoint.x - drawStartPoint.x);
    let depth = Math.abs(endPoint.z - drawStartPoint.z);
    
    if (width < 20) width = parseFloat(document.getElementById('draw-width').value) || 80;
    if (depth < 20) depth = parseFloat(document.getElementById('draw-depth').value) || 80;
    
    const centerX = (drawStartPoint.x + endPoint.x) / 2;
    const centerZ = (drawStartPoint.z + endPoint.z) / 2;
    const height = parseFloat(document.getElementById('draw-height').value) || 40;
    const radius = parseFloat(document.getElementById('draw-radius').value) || 15;
    
    createObject(currentDrawType, centerX, centerZ, width, depth, height, radius);
  }
  
  isDrawing = false;
  previewDiv.style.display = 'none';
  orbitControls.enabled = true;
  drawStartPoint = null;
});

renderer.domElement.addEventListener('click', (e) => {
  if (isDrawing) return;
  if (transformControls.dragging) return;
  
  // Raycast for selection
  const rect = renderer.domElement.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(objects);
  
  if (intersects.length > 0) {
    selectObject(intersects[0].object);
  } else {
    selectObject(null);
  }
});

renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

// ========== KEYBOARD SHORTCUTS ==========
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  
  switch(e.key.toLowerCase()) {
    case 'q': setDrawTool('rect'); break;
    case 'w': setDrawTool('round'); break;
    case 'e': setDrawTool('circle'); break;
    case '1': setTransformMode('select'); break;
    case '2': setTransformMode('translate'); break;
    case '3': setTransformMode('rotate'); break;
    case '4': setTransformMode('scale'); break;
    case 'delete': deleteSelected(); break;
    case 'escape': selectObject(null); break;
    case 'd': duplicateSelected(); break;
    case 'f': if(selectedObject) { orbitControls.target.copy(selectedObject.position); orbitControls.update(); } break;
  }
});

// ========== EVENT LISTENERS ==========
document.getElementById('tool-rect').onclick = () => setDrawTool('rect');
document.getElementById('tool-round').onclick = () => setDrawTool('round');
document.getElementById('tool-circle').onclick = () => setDrawTool('circle');
document.getElementById('tool-select').onclick = () => setTransformMode('select');
document.getElementById('tool-move').onclick = () => setTransformMode('translate');
document.getElementById('tool-rotate').onclick = () => setTransformMode('rotate');
document.getElementById('tool-scale').onclick = () => setTransformMode('scale');
document.getElementById('tool-duplicate').onclick = () => duplicateSelected();
document.getElementById('tool-delete').onclick = () => deleteSelected();
document.getElementById('tool-clear').onclick = () => clearAll();

document.querySelectorAll('.transform-btn').forEach(btn => {
  btn.onclick = () => setTransformMode(btn.dataset.mode);
});

document.getElementById('apply-extrude').onclick = () => {
  const height = parseFloat(document.getElementById('draw-height').value);
  extrudeSelected(height);
};

document.getElementById('apply-position').onclick = () => {
  if (selectedObject) {
    selectedObject.position.set(
      parseFloat(document.getElementById('pos-x').value) || 0,
      parseFloat(document.getElementById('pos-y').value) || 0,
      parseFloat(document.getElementById('pos-z').value) || 0
    );
    updatePropertyPanel();
    setStatus('Position updated');
  }
};

document.getElementById('apply-rotation').onclick = () => {
  if (selectedObject) {
    selectedObject.rotation.set(
      (parseFloat(document.getElementById('rot-x').value) || 0) * Math.PI / 180,
      (parseFloat(document.getElementById('rot-y').value) || 0) * Math.PI / 180,
      (parseFloat(document.getElementById('rot-z').value) || 0) * Math.PI / 180
    );
    updatePropertyPanel();
    setStatus('Rotation updated');
  }
};

document.getElementById('apply-dimensions').onclick = () => {
  if (selectedObject) {
    rebuildDimensions(
      parseFloat(document.getElementById('dim-w').value) || 80,
      parseFloat(document.getElementById('dim-d').value) || 80,
      parseFloat(document.getElementById('dim-h').value) || 40,
      parseFloat(document.getElementById('dim-r').value) || 15
    );
  }
};

document.getElementById('apply-color').onclick = () => {
  if (selectedObject) {
    const color = document.getElementById('color-picker').value;
    selectedObject.material.color.set(color);
    selectedObject.userData.originalColor = parseInt(color.slice(1), 16);
    setStatus('Color updated');
  }
};

document.getElementById('op-duplicate').onclick = () => duplicateSelected();
document.getElementById('op-snap-ground').onclick = () => {
  if (selectedObject) {
    selectedObject.position.y = 0;
    updatePropertyPanel();
    setStatus('Snapped to ground');
  }
};
document.getElementById('op-center').onclick = () => {
  if (selectedObject) {
    selectedObject.position.x = 0;
    selectedObject.position.z = 0;
    updatePropertyPanel();
    setStatus('Centered on grid');
  }
};

// ========== RESIZE HANDLER ==========
window.addEventListener('resize', () => {
  const width = viewport.clientWidth;
  const height = viewport.clientHeight;
  renderer.setSize(width, height);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
});

// ========== ANIMATION LOOP ==========
function animate() {
  requestAnimationFrame(animate);
  orbitControls.update();
  renderer.render(scene, camera);
}

animate();

// ========== INITIAL DEMO OBJECTS ==========
createObject('rect', -100, 80, 90, 70, 45);
createObject('round', 100, -70, 100, 85, 50, 18);
createObject('circle', 0, 130, 70, 70, 35);
selectObject(null);
setDrawTool('rect');

setStatus('AetherCAD ready — Click and drag to draw | Click objects to select | Mouse drag to rotate camera');

// Initial resize
setTimeout(() => {
  const width = viewport.clientWidth;
  const height = viewport.clientHeight;
  renderer.setSize(width, height);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}, 100);
</script>

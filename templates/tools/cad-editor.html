<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AetherCAD — 2D Design Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg: #0F0F0F;
  --bg2: #161616;
  --bg3: #1E1E1E;
  --bg4: #2C2C2C;
  --panel: #141414;
  --border: #2A2A2A;
  --border2: #3A3A3A;
  --accent: #0A84FF;
  --accent2: #409CFF;
  --accent3: #5E9CFF;
  --orange: #FF9F0A;
  --green: #32D74B;
  --red: #FF453A;
  --text: #ECECEC;
  --text2: #98989D;
  --text3: #636366;
  --white: #FFFFFF;
  --header-h: 40px;
  --toolbar-h: 72px;
  --statusbar-h: 28px;
  --left-w: 260px;
  --right-w: 280px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text);
}

html,body{height:100%;overflow:hidden;background:var(--bg);}
button{font-family:inherit;cursor:pointer;background:none;border:none;}
input{font-family:'JetBrains Mono',monospace;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}

/* Menu Bar */
#menubar{
  height:var(--header-h);
  background:rgba(22,22,22,0.98);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:4px;
  flex-shrink:0;
}
.app-logo{
  font-size:15px;font-weight:600;
  padding:0 16px 0 4px;
  margin-right:8px;
  border-right:1px solid var(--border);
  background:linear-gradient(135deg,#FFFFFF,#8E8E93);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.app-logo span{background:linear-gradient(135deg,#0A84FF,#5E9CFF);-webkit-background-clip:text;background-clip:text;color:transparent;}
.menu-item{
  padding:6px 12px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--text2);
  transition:0.1s;
}
.menu-item:hover{background:var(--bg4);color:var(--white);}
#menubar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.mb-badge{
  font-size:11px;color:var(--text2);
  padding:4px 10px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);
}

/* Main Toolbar */
#main-toolbar{
  height:var(--toolbar-h);
  background:rgba(22,22,22,0.96);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 24px;
  gap:16px;
  flex-shrink:0;
}
.tool-group{
  display:flex;
  gap:8px;
  padding:0 12px;
  border-right:1px solid var(--border);
}
.tool-group:last-child{border-right:none;}
.tool-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 20px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:12px;
  font-weight:500;
  min-width:80px;
  height:56px;
  transition:0.1s;
}
.tool-btn:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-1px);}
.tool-btn.active{background:rgba(10,132,255,0.15);border-color:var(--accent);color:var(--accent2);}
.tool-icon{font-size:22px;}
.tool-label{font-size:11px;}

/* Main Area */
#main{display:flex;flex:1;overflow:hidden;}

/* Left Panel - Layers/Objects */
#left-panel{
  width:var(--left-w);
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.panel-header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-weight:600;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:8px;
}
#objects-list{
  flex:1;
  overflow-y:auto;
  padding:8px;
}
.object-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 12px;
  margin:4px 0;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  transition:0.1s;
}
.object-item:hover{background:var(--bg4);border-color:var(--border2);}
.object-item.selected{background:rgba(10,132,255,0.2);border-color:var(--accent);}
.object-icon{font-size:18px;}
.object-info{flex:1;}
.object-name{font-size:12px;font-weight:500;}
.object-type{font-size:10px;color:var(--text3);}
.object-delete{
  opacity:0;
  padding:4px 8px;
  border-radius:6px;
  color:var(--red);
  font-size:14px;
}
.object-item:hover .object-delete{opacity:1;}
.object-delete:hover{background:rgba(255,69,58,0.2);}

/* Canvas Area */
#canvas-area{
  flex:1;
  position:relative;
  background:#0A0A0A;
  overflow:hidden;
}
#draw-canvas{
  display:block;
  width:100%;
  height:100%;
  cursor:crosshair;
}
.canvas-corner{
  position:absolute;
  font-size:10px;
  color:rgba(255,255,255,0.3);
  pointer-events:none;
  font-family:'JetBrains Mono',monospace;
}
#corner-tl{top:14px;left:16px;}
#corner-tr{top:14px;right:16px;}
#corner-bl{bottom:42px;left:16px;}

/* Drawing HUD */
#drawing-hud{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(22,22,22,0.95);
  backdrop-filter:blur(12px);
  border:1px solid var(--border2);
  border-radius:12px;
  display:flex;
  padding:8px 16px;
  gap:20px;
  z-index:20;
}
.hud-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
}
.hud-item label{color:var(--text2);}
.hud-item input{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:4px 8px;
  color:var(--text);
  width:70px;
}
.hud-item input:focus{outline:none;border-color:var(--accent);}
#apply-transform{
  background:var(--accent);
  border:none;
  padding:4px 16px;
  border-radius:6px;
  color:white;
  font-weight:500;
}

/* Right Panel - Properties */
#right-panel{
  width:var(--right-w);
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.prop-section{
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
.prop-section-title{
  font-size:11px;
  font-weight:600;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:12px;
}
.prop-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.prop-row label{
  width:60px;
  color:var(--text2);
  font-size:12px;
}
.prop-row input{
  flex:1;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:6px 8px;
  color:var(--text);
  font-size:12px;
}
.prop-row input:focus{outline:none;border-color:var(--accent);}
.prop-btn{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:8px;
  color:var(--text);
  font-size:12px;
  font-weight:500;
  margin-top:8px;
  transition:0.1s;
}
.prop-btn:hover{background:var(--bg4);border-color:var(--accent);}
.prop-btn.primary{background:var(--accent);border-color:var(--accent);color:white;}
.prop-btn.danger{background:rgba(255,69,58,0.1);border-color:var(--red);color:var(--red);}
.prop-btn.danger:hover{background:var(--red);color:white;}
.color-preview{
  width:40px;
  height:32px;
  border-radius:6px;
  border:1px solid var(--border);
}

/* Status Bar */
#statusbar{
  height:var(--statusbar-h);
  background:rgba(22,22,22,0.95);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:24px;
  flex-shrink:0;
  font-size:11px;
}
.status-item{color:var(--text3);display:flex;align-items:center;gap:6px;}
.status-item b{color:var(--text2);}
#status-coords{margin-left:auto;font-family:'JetBrains Mono',monospace;}

#wrapper{display:flex;flex-direction:column;height:100vh;}
</style>
</head>
<body>
<div id="wrapper">
<div id="menubar">
  <div class="app-logo">Aether<span>CAD</span></div>
  <button class="menu-item">File</button>
  <button class="menu-item">Edit</button>
  <button class="menu-item">View</button>
  <div id="menubar-right">
    <div class="mb-badge">2D DESIGN WORKSPACE</div>
    <div class="mb-badge" style="color:var(--green);">● READY</div>
  </div>
</div>

<div id="main-toolbar">
  <div class="tool-group">
    <button class="tool-btn" id="tool-rectangle">
      <span class="tool-icon">⬛</span>
      <span class="tool-label">Rectangle</span>
    </button>
    <button class="tool-btn" id="tool-curve-rect">
      <span class="tool-icon">⭔</span>
      <span class="tool-label">Curve Rect</span>
    </button>
    <button class="tool-btn" id="tool-circle">
      <span class="tool-icon">●</span>
      <span class="tool-label">Circle</span>
    </button>
  </div>
  <div class="tool-group">
    <button class="tool-btn" id="tool-select">
      <span class="tool-icon">🖱</span>
      <span class="tool-label">Select</span>
    </button>
  </div>
  <div class="tool-group">
    <button class="tool-btn" id="action-delete">
      <span class="tool-icon">🗑</span>
      <span class="tool-label">Delete</span>
    </button>
    <button class="tool-btn" id="action-clear">
      <span class="tool-icon">✕</span>
      <span class="tool-label">Clear All</span>
    </button>
  </div>
</div>

<div id="main">
  <div id="left-panel">
    <div class="panel-header">
      <span>📋</span> Objects
      <span style="flex:1"></span>
      <span id="object-count" style="color:var(--text3);">0</span>
    </div>
    <div id="objects-list"></div>
  </div>

  <div id="canvas-area">
    <canvas id="draw-canvas"></canvas>
    <div class="canvas-corner" id="corner-tl">AetherCAD · 2D Studio</div>
    <div class="canvas-corner" id="corner-tr">Grid: 20px</div>
    <div class="canvas-corner" id="corner-bl">Click to draw · Drag to move · Select to edit</div>
    
    <div id="drawing-hud">
      <div class="hud-item">
        <label>Width:</label>
        <input type="number" id="hud-w" step="1" value="100">
      </div>
      <div class="hud-item">
        <label>Height:</label>
        <input type="number" id="hud-h" step="1" value="100">
      </div>
      <div class="hud-item" id="curve-radius-group">
        <label>Radius:</label>
        <input type="number" id="hud-r" step="5" value="20">
      </div>
      <button id="apply-transform">Apply Size</button>
    </div>
  </div>

  <div id="right-panel">
    <div class="prop-section">
      <div class="prop-section-title">📐 Selected Object</div>
      <div id="selected-info" style="color:var(--text3); font-size:12px;">No object selected</div>
    </div>
    <div class="prop-section">
      <div class="prop-section-title">📍 Position</div>
      <div class="prop-row"><label>X:</label><input type="number" id="prop-x" step="1"></div>
      <div class="prop-row"><label>Y:</label><input type="number" id="prop-y" step="1"></div>
      <button class="prop-btn" id="apply-position">Apply Position</button>
    </div>
    <div class="prop-section">
      <div class="prop-section-title">📏 Size</div>
      <div class="prop-row"><label>Width:</label><input type="number" id="prop-w" step="1"></div>
      <div class="prop-row"><label>Height:</label><input type="number" id="prop-h" step="1"></div>
      <div class="prop-row" id="prop-radius-row"><label>Radius:</label><input type="number" id="prop-r" step="1"></div>
      <button class="prop-btn" id="apply-size">Apply Size</button>
    </div>
    <div class="prop-section">
      <div class="prop-section-title">🎨 Style</div>
      <div class="prop-row">
        <label>Fill:</label>
        <input type="color" id="prop-fill" value="#4a7ac8">
        <div class="color-preview" id="fill-preview" style="background:#4a7ac8;"></div>
      </div>
      <div class="prop-row">
        <label>Stroke:</label>
        <input type="color" id="prop-stroke" value="#ffffff">
        <div class="color-preview" id="stroke-preview" style="background:#ffffff;"></div>
      </div>
      <div class="prop-row">
        <label>Stroke W:</label>
        <input type="number" id="prop-stroke-width" step="1" value="2" min="1" max="10">
      </div>
      <button class="prop-btn" id="apply-style">Apply Style</button>
    </div>
    <div class="prop-section">
      <button class="prop-btn danger" id="delete-selected">Delete Selected</button>
      <button class="prop-btn" id="duplicate-object">Duplicate</button>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="status-item" id="status-message">Ready — Select a shape to draw</div>
  <div class="status-item"><b>Objects:</b> <span id="status-count">0</span></div>
  <div class="status-item"><b>Tool:</b> <span id="status-tool">Rectangle</span></div>
  <div class="status-item" id="status-coords"><b>Cursor:</b> 0, 0</div>
</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('draw-canvas');
  const ctx = canvas.getContext('2d');
  
  let objects = [];
  let selectedIndex = -1;
  let currentTool = 'rectangle'; // rectangle, curve-rect, circle, select
  let isDragging = false;
  let dragStart = { x: 0, y: 0 };
  let dragObject = false;
  let dragOffset = { x: 0, y: 0 };
  let objectCounter = 0;
  
  // Grid settings
  const GRID_SIZE = 20;
  let panX = 0, panY = 0;
  let scale = 1;
  let isPanning = false;
  let panStart = { x: 0, y: 0 };
  
  // Resize canvas
  function resizeCanvas() {
    const container = document.getElementById('canvas-area');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    render();
  }
  
  // Snap to grid
  function snapToGrid(val) {
    return Math.round(val / GRID_SIZE) * GRID_SIZE;
  }
  
  // Convert screen to world coordinates
  function screenToWorld(screenX, screenY) {
    return {
      x: (screenX - panX) / scale,
      y: (screenY - panY) / scale
    };
  }
  
  function worldToScreen(worldX, worldY) {
    return {
      x: worldX * scale + panX,
      y: worldY * scale + panY
    };
  }
  
  // Draw a rectangle with optional rounded corners
  function drawShape(ctx, obj, isSelected = false) {
    ctx.save();
    ctx.translate(obj.x, obj.y);
    
    ctx.beginPath();
    if (obj.type === 'circle') {
      ctx.ellipse(0, 0, obj.width/2, obj.height/2, 0, 0, Math.PI * 2);
    } else if (obj.type === 'curve-rect') {
      const radius = obj.radius || 20;
      ctx.moveTo(radius, 0);
      ctx.lineTo(obj.width - radius, 0);
      ctx.quadraticCurveTo(obj.width, 0, obj.width, radius);
      ctx.lineTo(obj.width, obj.height - radius);
      ctx.quadraticCurveTo(obj.width, obj.height, obj.width - radius, obj.height);
      ctx.lineTo(radius, obj.height);
      ctx.quadraticCurveTo(0, obj.height, 0, obj.height - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
    } else {
      ctx.rect(0, 0, obj.width, obj.height);
    }
    
    ctx.fillStyle = obj.fillColor;
    ctx.fill();
    ctx.strokeStyle = obj.strokeColor;
    ctx.lineWidth = obj.strokeWidth;
    ctx.stroke();
    
    if (isSelected) {
      ctx.strokeStyle = '#0A84FF';
      ctx.lineWidth = 3;
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Draw resize handles
      ctx.fillStyle = '#0A84FF';
      const handles = [
        { x: 0, y: 0 }, { x: obj.width, y: 0 },
        { x: 0, y: obj.height }, { x: obj.width, y: obj.height }
      ];
      handles.forEach(h => {
        ctx.fillRect(h.x - 4, h.y - 4, 8, 8);
      });
    }
    ctx.restore();
  }
  
  function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw grid
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(scale, scale);
    
    ctx.strokeStyle = '#2A2A2A';
    ctx.lineWidth = 1 / scale;
    const startX = Math.floor(-panX / scale / GRID_SIZE) * GRID_SIZE;
    const startY = Math.floor(-panY / scale / GRID_SIZE) * GRID_SIZE;
    const endX = startX + canvas.width / scale + GRID_SIZE;
    const endY = startY + canvas.height / scale + GRID_SIZE;
    
    for (let x = startX; x < endX; x += GRID_SIZE) {
      ctx.beginPath();
      ctx.moveTo(x, startY);
      ctx.lineTo(x, endY);
      ctx.stroke();
    }
    for (let y = startY; y < endY; y += GRID_SIZE) {
      ctx.beginPath();
      ctx.moveTo(startX, y);
      ctx.lineTo(endX, y);
      ctx.stroke();
    }
    
    // Draw objects
    objects.forEach((obj, idx) => {
      drawShape(ctx, obj, idx === selectedIndex);
    });
    ctx.restore();
    
    // Draw preview for drawing
    if (isDragging && !dragObject && (currentTool === 'rectangle' || currentTool === 'curve-rect' || currentTool === 'circle')) {
      const startWorld = screenToWorld(dragStart.x, dragStart.y);
      const currentWorld = screenToWorld(window.lastMouseX || dragStart.x, window.lastMouseY || dragStart.y);
      const w = currentWorld.x - startWorld.x;
      const h = currentWorld.y - startWorld.y;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      if (currentTool === 'circle') {
        const radius = Math.abs(w) / 2;
        const centerX = startWorld.x + w/2;
        const centerY = startWorld.y + h/2;
        const screenCenter = worldToScreen(centerX, centerY);
        const screenRadius = radius * scale;
        ctx.ellipse(screenCenter.x, screenCenter.y, screenRadius, screenRadius, 0, 0, Math.PI * 2);
      } else if (currentTool === 'curve-rect') {
        const radius = Math.min(Math.abs(w), Math.abs(h)) * 0.2;
        const x = Math.min(startWorld.x, currentWorld.x);
        const y = Math.min(startWorld.y, currentWorld.y);
        const width = Math.abs(w);
        const height = Math.abs(h);
        const screenX = x * scale + panX;
        const screenY = y * scale + panY;
        const screenW = width * scale;
        const screenH = height * scale;
        const screenR = radius * scale;
        ctx.moveTo(screenX + screenR, screenY);
        ctx.lineTo(screenX + screenW - screenR, screenY);
        ctx.quadraticCurveTo(screenX + screenW, screenY, screenX + screenW, screenY + screenR);
        ctx.lineTo(screenX + screenW, screenY + screenH - screenR);
        ctx.quadraticCurveTo(screenX + screenW, screenY + screenH, screenX + screenW - screenR, screenY + screenH);
        ctx.lineTo(screenX + screenR, screenY + screenH);
        ctx.quadraticCurveTo(screenX, screenY + screenH, screenX, screenY + screenH - screenR);
        ctx.lineTo(screenX, screenY + screenR);
        ctx.quadraticCurveTo(screenX, screenY, screenX + screenR, screenY);
      } else {
        const x = Math.min(startWorld.x, currentWorld.x);
        const y = Math.min(startWorld.y, currentWorld.y);
        const width = Math.abs(w);
        const height = Math.abs(h);
        ctx.fillRect(x * scale + panX, y * scale + panY, width * scale, height * scale);
      }
      ctx.fillStyle = 'rgba(10,132,255,0.3)';
      ctx.fill();
      ctx.strokeStyle = '#0A84FF';
      ctx.stroke();
      ctx.restore();
    }
  }
  
  function addObject(type, x, y, w, h, radius = 20) {
    const obj = {
      id: ++objectCounter,
      type: type,
      x: snapToGrid(x),
      y: snapToGrid(y),
      width: Math.max(20, snapToGrid(w)),
      height: Math.max(20, snapToGrid(h)),
      radius: type === 'curve-rect' ? radius : 0,
      fillColor: '#4a7ac8',
      strokeColor: '#ffffff',
      strokeWidth: 2
    };
    objects.push(obj);
    selectedIndex = objects.length - 1;
    updateUI();
    render();
    setStatus(`Created ${type === 'curve-rect' ? 'Curve Rectangle' : type}`);
  }
  
  function updateUI() {
    const listEl = document.getElementById('objects-list');
    listEl.innerHTML = '';
    objects.forEach((obj, idx) => {
      const div = document.createElement('div');
      div.className = 'object-item' + (idx === selectedIndex ? ' selected' : '');
      div.innerHTML = `
        <div class="object-icon">${obj.type === 'circle' ? '●' : (obj.type === 'curve-rect' ? '⭔' : '⬛')}</div>
        <div class="object-info">
          <div class="object-name">${obj.type === 'curve-rect' ? 'Curve Rect' : obj.type} ${obj.id}</div>
          <div class="object-type">${obj.width} × ${obj.height}</div>
        </div>
        <button class="object-delete" data-idx="${idx}">✕</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('object-delete')) {
          e.stopPropagation();
          deleteObject(idx);
        } else {
          selectObject(idx);
        }
      });
      listEl.appendChild(div);
    });
    document.getElementById('object-count').innerText = objects.length;
    document.getElementById('status-count').innerText = objects.length;
    document.getElementById('status-tool').innerText = 
      currentTool === 'rectangle' ? 'Rectangle' : (currentTool === 'curve-rect' ? 'Curve Rect' : (currentTool === 'circle' ? 'Circle' : 'Select'));
    
    if (selectedIndex >= 0 && objects[selectedIndex]) {
      const obj = objects[selectedIndex];
      document.getElementById('selected-info').innerHTML = `${obj.type} #${obj.id}<br>Size: ${obj.width}×${obj.height}`;
      document.getElementById('prop-x').value = obj.x;
      document.getElementById('prop-y').value = obj.y;
      document.getElementById('prop-w').value = obj.width;
      document.getElementById('prop-h').value = obj.height;
      document.getElementById('prop-fill').value = obj.fillColor;
      document.getElementById('prop-stroke').value = obj.strokeColor;
      document.getElementById('prop-stroke-width').value = obj.strokeWidth;
      document.getElementById('fill-preview').style.background = obj.fillColor;
      document.getElementById('stroke-preview').style.background = obj.strokeColor;
      if (obj.type === 'curve-rect') {
        document.getElementById('prop-radius-row').style.display = 'flex';
        document.getElementById('prop-r').value = obj.radius || 20;
      } else {
        document.getElementById('prop-radius-row').style.display = 'none';
      }
    } else {
      document.getElementById('selected-info').innerHTML = 'No object selected';
      document.getElementById('prop-x').value = '';
      document.getElementById('prop-y').value = '';
      document.getElementById('prop-w').value = '';
      document.getElementById('prop-h').value = '';
    }
    
    // Update HUD visibility
    const curveGroup = document.getElementById('curve-radius-group');
    if (currentTool === 'curve-rect') {
      curveGroup.style.display = 'flex';
    } else {
      curveGroup.style.display = 'none';
    }
  }
  
  function selectObject(idx) {
    selectedIndex = idx;
    updateUI();
    render();
    if (idx >= 0) setStatus(`Selected ${objects[idx].type} #${objects[idx].id}`);
    else setStatus('Deselected');
  }
  
  function deleteObject(idx) {
    objects.splice(idx, 1);
    if (selectedIndex >= objects.length) selectedIndex = objects.length - 1;
    if (objects.length === 0) selectedIndex = -1;
    updateUI();
    render();
    setStatus('Object deleted');
  }
  
  function clearAll() {
    objects = [];
    selectedIndex = -1;
    updateUI();
    render();
    setStatus('All objects cleared');
  }
  
  function setStatus(msg) {
    document.getElementById('status-message').innerHTML = msg;
    setTimeout(() => {
      if (document.getElementById('status-message').innerHTML === msg) {
        document.getElementById('status-message').innerHTML = 'Ready';
      }
    }, 2000);
  }
  
  // Mouse handlers
  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (canvas.width / rect.width),
      y: (e.clientY - rect.top) * (canvas.height / rect.height)
    };
  }
  
  canvas.addEventListener('mousedown', (e) => {
    const pos = getMousePos(e);
    window.lastMouseX = pos.x;
    window.lastMouseY = pos.y;
    
    if (e.button === 1 || e.shiftKey) {
      isPanning = true;
      panStart = { x: pos.x - panX, y: pos.y - panY };
      return;
    }
    
    if (currentTool === 'select') {
      // Check if clicking on an object
      const worldPos = screenToWorld(pos.x, pos.y);
      let hitIndex = -1;
      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        if (worldPos.x >= obj.x && worldPos.x <= obj.x + obj.width &&
            worldPos.y >= obj.y && worldPos.y <= obj.y + obj.height) {
          hitIndex = i;
          break;
        }
      }
      if (hitIndex >= 0) {
        selectObject(hitIndex);
        dragObject = true;
        dragOffset = {
          x: worldPos.x - objects[hitIndex].x,
          y: worldPos.y - objects[hitIndex].y
        };
      } else {
        selectObject(-1);
      }
      render();
    } else if (currentTool === 'rectangle' || currentTool === 'curve-rect' || currentTool === 'circle') {
      isDragging = true;
      dragStart = { x: pos.x, y: pos.y };
      render();
    }
  });
  
  canvas.addEventListener('mousemove', (e) => {
    const pos = getMousePos(e);
    window.lastMouseX = pos.x;
    window.lastMouseY = pos.y;
    const worldPos = screenToWorld(pos.x, pos.y);
    document.getElementById('status-coords').innerHTML = `<b>Cursor:</b> ${Math.round(worldPos.x)}, ${Math.round(worldPos.y)}`;
    
    if (isPanning) {
      panX = pos.x - panStart.x;
      panY = pos.y - panStart.y;
      render();
      return;
    }
    
    if (dragObject && selectedIndex >= 0) {
      const obj = objects[selectedIndex];
      obj.x = snapToGrid(worldPos.x - dragOffset.x);
      obj.y = snapToGrid(worldPos.y - dragOffset.y);
      render();
      updateUI();
    } else if (isDragging && !dragObject) {
      render();
    }
  });
  
  canvas.addEventListener('mouseup', (e) => {
    if (isPanning) {
      isPanning = false;
      return;
    }
    
    if (isDragging && !dragObject && (currentTool === 'rectangle' || currentTool === 'curve-rect' || currentTool === 'circle')) {
      const endPos = getMousePos(e);
      const startWorld = screenToWorld(dragStart.x, dragStart.y);
      const endWorld = screenToWorld(endPos.x, endPos.y);
      const w = Math.abs(endWorld.x - startWorld.x);
      const h = Math.abs(endWorld.y - startWorld.y);
      const x = Math.min(startWorld.x, endWorld.x);
      const y = Math.min(startWorld.y, endWorld.y);
      
      if (w > 10 && h > 10) {
        const radius = parseInt(document.getElementById('hud-r').value) || 20;
        addObject(currentTool, x, y, w, h, radius);
      }
    }
    
    isDragging = false;
    dragObject = false;
    render();
  });
  
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale = Math.min(3, Math.max(0.5, scale * delta));
    render();
  });
  
  // Tool buttons
  document.getElementById('tool-rectangle').addEventListener('click', () => {
    currentTool = 'rectangle';
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('tool-rectangle').classList.add('active');
    setStatus('Tool: Rectangle — click and drag to draw');
    updateUI();
  });
  document.getElementById('tool-curve-rect').addEventListener('click', () => {
    currentTool = 'curve-rect';
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('tool-curve-rect').classList.add('active');
    setStatus('Tool: Curve Rectangle — click and drag to draw rounded rectangles');
    updateUI();
  });
  document.getElementById('tool-circle').addEventListener('click', () => {
    currentTool = 'circle';
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('tool-circle').classList.add('active');
    setStatus('Tool: Circle — click and drag to draw ellipses');
    updateUI();
  });
  document.getElementById('tool-select').addEventListener('click', () => {
    currentTool = 'select';
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('tool-select').classList.add('active');
    setStatus('Tool: Select — click objects to select, drag to move');
    updateUI();
  });
  
  document.getElementById('action-delete').addEventListener('click', () => {
    if (selectedIndex >= 0) deleteObject(selectedIndex);
    else setStatus('No object selected');
  });
  document.getElementById('action-clear').addEventListener('click', clearAll);
  document.getElementById('delete-selected').addEventListener('click', () => {
    if (selectedIndex >= 0) deleteObject(selectedIndex);
    else setStatus('No object selected');
  });
  document.getElementById('duplicate-object').addEventListener('click', () => {
    if (selectedIndex >= 0) {
      const original = objects[selectedIndex];
      const newObj = JSON.parse(JSON.stringify(original));
      newObj.id = ++objectCounter;
      newObj.x += 30;
      newObj.y += 30;
      objects.push(newObj);
      selectedIndex = objects.length - 1;
      updateUI();
      render();
      setStatus(`Duplicated ${original.type}`);
    } else setStatus('No object selected');
  });
  
  // Property updates
  document.getElementById('apply-position').addEventListener('click', () => {
    if (selectedIndex >= 0) {
      objects[selectedIndex].x = snapToGrid(parseInt(document.getElementById('prop-x').value) || 0);
      objects[selectedIndex].y = snapToGrid(parseInt(document.getElementById('prop-y').value) || 0);
      updateUI();
      render();
      setStatus('Position updated');
    }
  });
  document.getElementById('apply-size').addEventListener('click', () => {
    if (selectedIndex >= 0) {
      objects[selectedIndex].width = Math.max(20, parseInt(document.getElementById('prop-w').value) || 50);
      objects[selectedIndex].height = Math.max(20, parseInt(document.getElementById('prop-h').value) || 50);
      if (objects[selectedIndex].type === 'curve-rect') {
        objects[selectedIndex].radius = parseInt(document.getElementById('prop-r').value) || 20;
      }
      updateUI();
      render();
      setStatus('Size updated');
    }
  });
  document.getElementById('apply-style').addEventListener('click', () => {
    if (selectedIndex >= 0) {
      objects[selectedIndex].fillColor = document.getElementById('prop-fill').value;
      objects[selectedIndex].strokeColor = document.getElementById('prop-stroke').value;
      objects[selectedIndex].strokeWidth = parseInt(document.getElementById('prop-stroke-width').value) || 2;
      document.getElementById('fill-preview').style.background = objects[selectedIndex].fillColor;
      document.getElementById('stroke-preview').style.background = objects[selectedIndex].strokeColor;
      updateUI();
      render();
      setStatus('Style applied');
    }
  });
  document.getElementById('apply-transform').addEventListener('click', () => {
    if (selectedIndex >= 0) {
      objects[selectedIndex].width = Math.max(20, parseInt(document.getElementById('hud-w').value) || 100);
      objects[selectedIndex].height = Math.max(20, parseInt(document.getElementById('hud-h').value) || 100);
      if (objects[selectedIndex].type === 'curve-rect') {
        objects[selectedIndex].radius = parseInt(document.getElementById('hud-r').value) || 20;
      }
      updateUI();
      render();
      setStatus('Size applied');
    } else {
      setStatus('Select an object first');
    }
  });
  
  // Color preview
  document.getElementById('prop-fill').addEventListener('input', (e) => {
    document.getElementById('fill-preview').style.background = e.target.value;
  });
  document.getElementById('prop-stroke').addEventListener('input', (e) => {
    document.getElementById('stroke-preview').style.background = e.target.value;
  });
  
  // Add some demo objects
  addObject('rectangle', 100, 100, 120, 80);
  addObject('curve-rect', 300, 150, 140, 100, 25);
  addObject('circle', 550, 120, 90, 90);
  selectObject(-1);
  
  // Initial setup
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  document.getElementById('tool-rectangle').classList.add('active');
  
  render();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}NexaFlow{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050A10;--bg2:#090F18;--surface:#0D1420;--surface2:#111927;
  --border:#1C2A3A;--accent:#00C896;--accent2:#0078FF;--accent3:#7B61FF;
  --text:#E8F0FA;--muted:#6B8099;--highlight:#00FFB2;--warn:#FF6B35;--danger:#FF4D6D;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}
input,textarea,select{font-family:var(--font-body)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:var(--font-body);font-weight:600;font-size:.9rem;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:var(--highlight);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:.73rem;font-weight:700;letter-spacing:.04em}
.badge-active{background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.25);color:var(--accent)}
.badge-inactive{background:rgba(107,128,153,.12);border:1px solid rgba(107,128,153,.25);color:var(--muted)}
.badge-suspended{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);color:var(--danger)}
.badge-paused{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.25);color:var(--warn)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.form-control{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.9rem;transition:border-color .2s}
.form-control:focus{outline:none;border-color:var(--accent)}
.form-control::placeholder{color:var(--muted)}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:.88rem}
.alert-error{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:#FF8FA3}
.alert-success{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);color:var(--accent)}
.alert-info{background:rgba(0,120,255,.1);border:1px solid rgba(0,120,255,.3);color:#60A0FF}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% if messages %}
<div style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px">
{% for message in messages %}
<div class="alert alert-{{ message.tags }}" style="box-shadow:var(--shadow)">{{ message }}</div>
{% endfor %}
</div>
{% endif %}
{% block content %}{% endblock %}
{% block extra_js %}{% endblock %}
</body>
</html>
